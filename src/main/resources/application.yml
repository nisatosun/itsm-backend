server:
  port: 8080

spring:
  application:
    name: itsm-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/itsm_db
    username: elifnisatosun
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/itsm-realm

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG



